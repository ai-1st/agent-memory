# Boots the maxxed memory service. `docker compose up` is the only setup step.
#
# Container default port is 8080 (the eval points here). For local/parallel runs
# the maxxed dev/bench port is 8093 — override with: HOST_PORT=8093 docker compose up
services:
  memory-service:
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      MEMORY_DB_DIR: /data/pgdata
      # "llm" = full LLM extract/reconcile + embeddings + hybrid recall (needs keys).
      # "rule" = fully offline rule-based fallback (no network).
      MEMORY_PIPELINE: ${MEMORY_PIPELINE:-llm}
      MEMORY_LLM_MODEL: ${MEMORY_LLM_MODEL:-claude-opus-4-8}
      MEMORY_EMBED_MODEL: ${MEMORY_EMBED_MODEL:-text-embedding-3-large}
      MEMORY_EMBED_DIM: ${MEMORY_EMBED_DIM:-3072}
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - memory-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 8s
    restart: unless-stopped

volumes:
  memory-data:
