# Boots the "simple" memory service. `docker compose up` is the only setup step.
#
# Container listens on 8080 (the eval default). The HOST port is overridable so
# variants can run in parallel — this service benches on 8092 locally:
#   HOST_PORT=8092 docker compose up
services:
  memory-service:
    build: .
    ports:
      # host:container — default 8080:8080 for the eval; override HOST_PORT locally.
      - "${HOST_PORT:-8080}:8080"
    environment:
      PORT: 8080
      MEMORY_DATA_DIR: /data/pgdata
      # With no keys the service runs the deterministic offline provider. Supply
      # both keys (and leave MEMORY_PROVIDER unset) to enable Claude + OpenAI.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      MEMORY_PROVIDER: ${MEMORY_PROVIDER:-}
      MEMORY_COMPACTION: ${MEMORY_COMPACTION:-on}
    volumes:
      - memory-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  memory-data:
