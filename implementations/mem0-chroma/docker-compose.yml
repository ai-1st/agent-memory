# Vanilla mem0 + Chroma baseline. `docker compose up` is the only setup step.
services:
  mem0-chroma:
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      MEMORY_DATA_DIR: /data/chroma
      MEMORY_LLM_MODEL: ${MEMORY_LLM_MODEL:-claude-haiku-4-5-20251001}
      MEMORY_EMBED_MODEL: ${MEMORY_EMBED_MODEL:-text-embedding-3-large}
      MEMORY_EMBED_DIM: ${MEMORY_EMBED_DIM:-3072}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - mem0-chroma-data:/data
    restart: unless-stopped
volumes:
  mem0-chroma-data:
