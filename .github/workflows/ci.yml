name: CI

on:
  push:
    branches: [main, "impl/**"]
  pull_request:

jobs:
  quality:
    name: lint · requirements · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Lint (biome)
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Assignment requirements guardrail
        run: npm run check:reqs
      - name: Tests
        run: npm test

  docker-smoke:
    name: docker compose · smoke · bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build & start
        run: docker compose up -d --build
      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then echo "healthy"; exit 0; fi
            sleep 2
          done
          echo "service did not become healthy"; docker compose logs; exit 1
      - name: Smoke test (§7)
        run: bash scripts/smoke.sh
      - name: Benchmark harness
        run: npm run bench -- --label ci
      - name: Persistence across restart (down && up)
        run: |
          docker compose down
          docker compose up -d
          for i in $(seq 1 30); do curl -sf http://localhost:8080/health && break || sleep 2; done
          curl -sf http://localhost:8080/users/user-1/memories | grep -i berlin
      - name: Logs + teardown
        if: always()
        run: |
          docker compose logs || true
          docker compose down -v || true
