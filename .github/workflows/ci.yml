name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: lint · requirements · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Assignment requirements guardrail
        run: python scripts/check_requirements.py
      - name: Tests
        run: pytest -q

  docker-smoke:
    name: docker compose · smoke · bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & start
        run: docker compose up -d --build
      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then echo "healthy"; exit 0; fi
            sleep 2
          done
          echo "service did not become healthy"; docker compose logs; exit 1
      - name: Smoke test (§7)
        run: bash scripts/smoke.sh
      - name: Benchmark harness
        run: python bench/harness.py --label ci
      - name: Persistence across restart
        run: |
          docker compose restart
          for i in $(seq 1 30); do curl -sf http://localhost:8080/health && break || sleep 2; done
          curl -sf http://localhost:8080/users/user-1/memories | grep -i berlin
      - name: Logs + teardown
        if: always()
        run: |
          docker compose logs || true
          docker compose down -v || true
