# Guardrails that run on every commit. Install once:  pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-yaml
      - id: check-json
        exclude: ^tsconfig\.json$ # tsconfig allows comments (JSONC)
      - id: detect-private-key # never commit a key/secret

  # Local hooks use the project's own toolchain (node_modules must be installed).
  - repo: local
    hooks:
      - id: biome
        name: biome (lint + format)
        entry: npx --no-install @biomejs/biome check --write
        language: system
        types_or: [ts, javascript, json]
        pass_filenames: false
      - id: assignment-requirements
        name: assignment requirements check
        entry: npx --no-install tsx scripts/check-requirements.ts
        language: system
        pass_filenames: false
        always_run: true
