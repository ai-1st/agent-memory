# Boots the memory service. `docker compose up` is the only setup step.
services:
  memory-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      MEMORY_DB_PATH: /data/memory.db
      # Optional: switch the extraction pipeline. Default is the offline baseline.
      MEMORY_EXTRACTOR: ${MEMORY_EXTRACTOR:-baseline}
      MEMORY_LLM_PROVIDER: ${MEMORY_LLM_PROVIDER:-openai}
      # Optional bearer token + LLM keys. Supplied by the eval harness / .env.
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - memory-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health',timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  memory-data:
